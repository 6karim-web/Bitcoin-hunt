name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle 7.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6'

      - name: Auto-Fix and Build
        run: |
          # 1. Trouver le projet
          PROJ_DIR=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          cd "$PROJ_DIR"
          
          # 2. Configurer les ressources
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=256m" >> gradle.properties
          
          # 3. Build forcé
          gradle assembleDebug --stacktrace --no-daemon -x lint -x test

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
