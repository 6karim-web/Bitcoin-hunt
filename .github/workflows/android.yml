name: Build Android APK - Force Clean

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Radical Clean and Build
        run: |
          # 1. Trouver le vrai dossier racine (celui qui a settings.gradle)
          REAL_ROOT=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          echo "ROOT détecté : $REAL_ROOT"
          cd "$REAL_ROOT"

          # 2. Supprimer TOUS les fichiers qui ne sont pas essentiels au build Android
          # On vire les fichiers proto, les fichiers temporaires et les doublons
          find . -name "*.proto" -delete
          find . -name "duplicate_*" -delete
          find . -name "*.apk" -delete
          
          # 3. Réparer les propriétés Gradle pour forcer la compatibilité
          rm -f gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties

          # 4. Forcer Gradle à ignorer les erreurs de structure mineures
          # On essaie d'abord la tâche globale 'assemble' qui est plus permissive
          gradle assemble --no-daemon -x test -x lint --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-force
          path: "**/*.apk"
          retention-days: 7
