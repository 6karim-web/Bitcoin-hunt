name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Clean and Fix Structure
        run: |
          # 1. On crée un dossier de travail propre
          mkdir -p workspace/app/src
          
          # 2. On récupère les fichiers de configuration (les .gradle)
          find . -name "settings.gradle" -exec cp {} workspace/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} workspace/ \;
          find . -name "gradle.properties" -exec cp {} workspace/ \;
          
          # 3. On récupère le build.gradle de l'application
          find . -name "build.gradle" -path "*/app/*" -exec cp {} workspace/app/ \;
          
          # 4. On récupère TOUT le contenu du dossier src (le code et le design)
          # On cherche le dossier 'main' et on le copie au bon endroit
          SRC_MAIN=$(find . -type d -name "main" | head -n 1)
          cp -r "$SRC_MAIN" workspace/app/src/
          
          # 5. On lance la compilation depuis le dossier propre
          cd workspace
          gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
