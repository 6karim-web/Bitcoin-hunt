name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Flatten Project and Build
        run: |
          # 1. On crée un dossier de travail propre à la racine
          mkdir -p final_app/app
          
          # 2. On aspire TOUS les fichiers .gradle, .properties et .xml peu importe où ils sont
          find . -name "settings.gradle" -exec cp {} final_app/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} final_app/ \;
          find . -name "gradle.properties" -exec cp {} final_app/ \;
          find . -name "build.gradle" -path "*/app/*" -exec cp {} final_app/app/ \;
          
          # 3. On aspire le code source (src) et on le met au bon endroit
          SRC_DIR=$(find . -type d -name "src" | head -n 1)
          cp -r "$SRC_DIR" final_app/app/
          
          # 4. On lance la compilation depuis le dossier propre
          cd final_app
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
