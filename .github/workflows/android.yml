name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Fix Duplicates and Build
        run: |
          # 1. On reconstruit le projet comme avant
          mkdir -p final_app/app/src/main
          find . -name "settings.gradle" -exec cp {} final_app/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} final_app/ \;
          find . -name "gradle.properties" -exec cp {} final_app/ \;
          find . -name "build.gradle" -path "*/app/*" -exec cp {} final_app/app/ \;
          SRC_DIR=$(find . -type d -name "src" | head -n 1)
          cp -r "$SRC_DIR"/. final_app/app/src/ || true
          
          cd final_app
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 2. LA SOLUTION : On force Gradle à exclure les doublons protobuf
          # On modifie le build.gradle de l'app à la volée pour ajouter l'exclusion
          sed -i '/dependencies {/a \    modules { module("com.google.protobuf:protobuf-javalite") { replacedBy("com.google.protobuf:protobuf-java", "Conflicting libraries") } }' app/build.gradle
          
          # 3. Compilation finale
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
