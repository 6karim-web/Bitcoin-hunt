name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Build Android Project
        run: |
          # 1. Localiser le dossier racine du projet Android
          PROJ_ROOT=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          echo "Dossier projet détecté : $PROJ_ROOT"
          
          # 2. Entrer dans ce dossier pour exécuter les commandes
          cd "$PROJ_ROOT"
          
          # 3. Nettoyage et configuration rapide
          find . -name "*.proto" -type f -delete || true
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 4. Exécuter le build (on utilise 'gradle' car setup-gradle l'a installé)
          # Si ça échoue encore, on essaiera 'assemble' tout court
          gradle assembleDebug --no-daemon -x test -x lint

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/*.apk" # Recherche plus large pour être sûr de trouver l'APK
          retention-days: 7
