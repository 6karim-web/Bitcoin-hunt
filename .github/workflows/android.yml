name: Build Android APK - FINAL FIX 2026

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Rebuild Project for Gradle 9
        run: |
          # 1. Nettoyage radical
          rm -rf .gradle app/build build settings.gradle build.gradle app/build.gradle

          # 2. Structure
          mkdir -p app/src/main/java/com/example/bitcoinhunt
          mkdir -p app/src/main/res/values

          # 3. Config compatible Gradle 9.4.1 + AGP 8.3+
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "BitcoinHunt"
          include ':app'
          EOF

          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.3.0' apply false
              id 'com.android.library' version '8.3.0' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.bitcoinhunt'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.bitcoinhunt"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures {
                  buildConfig = true
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # 4. Manifest de secours (indispensable)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://android.com">
              <application android:label="Bitcoin Hunt">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. Build avec le Gradle 9.4.1 du système
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BitcoinHunt-Success
          path: app/build/outputs/apk/debug/*.apk
