name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Nuclear Fix and Build
        run: |
          # 1. On identifie le VRAI dossier du projet (celui qui a le code source)
          # On cherche le dossier 'app' le plus profond
          REAL_APP_DIR=$(find . -type d -name "app" | head -n 1)
          REAL_PROJECT_ROOT=$(dirname "$REAL_APP_DIR")
          echo "Projet détecté dans : $REAL_PROJECT_ROOT"
          
          # 2. On se déplace dedans pour que Gradle ne soit plus perdu
          cd "$REAL_PROJECT_ROOT"
          
          # 3. On force les réglages de compatibilité
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 4. On lance la compilation
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
