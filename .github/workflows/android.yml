name: Build Android APK - TOTAL CLEAN

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Radical Cleanup and Force Build
        run: |
          # 1. MENAGE RADICAL : On crée un dossier temporaire vide
          mkdir -p clean_app/app/src/main/java/com/example/bitcoinhunt
          mkdir -p clean_app/app/src/main/res/values
          
          # 2. RÉCUPÉRATION : On cherche le Manifest et le MainActivity n'importe où
          MANIFEST=$(find . -name "AndroidManifest.xml" | head -n 1)
          MAIN_ACTIVITY=$(find . -name "MainActivity.java" -o -name "MainActivity.kt" | head -n 1)
          
          # 3. RECONSTRUCTION : On les place dans notre structure propre
          cp "$MANIFEST" clean_app/app/src/main/AndroidManifest.xml || echo "Manifest manquant"
          cp "$MAIN_ACTIVITY" clean_app/app/src/main/java/com/example/bitcoinhunt/MainActivity.java || echo "Code manquant"
          
          # 4. FORÇAGE DES CONFIGS : On écrase les build.gradle avec du code qui marche
          cat <<EOF > clean_app/settings.gradle
          rootProject.name = "BitcoinHunt"
          include ':app'
          EOF

          cat <<EOF > clean_app/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > clean_app/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.bitcoinhunt'
              compileSdk 33
              defaultConfig {
                  applicationId "com.example.bitcoinhunt"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          # 5. RESSOURCES DE SECOURS (pour éviter l'erreur "not found")
          cat <<EOF > clean_app/app/src/main/res/values/strings.xml
          <resources><string name="app_name">Bitcoin Hunt</string></resources>
          EOF
          
          cat <<EOF > clean_app/app/src/main/res/values/themes.xml
          <resources><style name="Theme.BitcoinBenchmark" parent="Theme.MaterialComponents.DayNight.DarkActionBar" /></resources>
          EOF

          # 6. LE BUILD FINAL
          cd clean_app
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-final
          path: "**/*.apk"
