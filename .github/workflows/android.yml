name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Locate and Build APK
        run: |
          # 1. On trouve le dossier qui contient le VRAI projet (celui avec settings.gradle)
          ROOT_DIR=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          echo "Racine du projet trouvée dans : $ROOT_DIR"
          
          # 2. On entre dans ce dossier et on force la config du SDK
          cd "$ROOT_DIR"
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 3. On lance la compilation de TOUS les projets trouvés
          gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
