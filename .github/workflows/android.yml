name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Ultimate Build
        run: |
          # 1. Nettoyage et reconstruction propre
          mkdir -p final_app/app/src/main
          find . -name "settings.gradle" -exec cp {} final_app/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} final_app/ \;
          find . -name "gradle.properties" -exec cp {} final_app/ \;
          find . -name "build.gradle" -path "*/app/*" -exec cp {} final_app/app/ \;
          
          # 2. On récupère TOUT le code source
          SRC_DIR=$(find . -type d -name "src" | head -n 1)
          cp -r "$SRC_DIR"/. final_app/app/src/ || true
          
          # 3. Compilation forcée (on ignore les erreurs de ressources/images)
          cd final_app
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          gradle assembleDebug --no-daemon -x test -Pandroid.packageResources.ignoreErrors=true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
