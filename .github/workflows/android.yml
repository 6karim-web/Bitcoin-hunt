name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Fix Structure and Build
        run: |
          # 1. On cherche où est caché le fichier settings.gradle
          WRONG_PATH=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          echo "Projet trouvé dans : $WRONG_PATH"
          
          # 2. On déplace TOUT le contenu de ce dossier vers la racine du projet
          # C'est l'étape qui répare ton erreur de dossier
          cp -r "$WRONG_PATH"/. .
          
          # 3. On force la config du SDK et on lance la compilation
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
