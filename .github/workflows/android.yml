name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Auto-Detect and Build
        run: |
          # 1. Trouver où se cache le fichier settings.gradle
          PROJ_PATH=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          
          if [ -z "$PROJ_PATH" ]; then
            echo "ERREUR : Impossible de trouver le fichier settings.gradle dans le dépôt !"
            exit 1
          fi
          
          echo "Projet détecté dans le dossier : $PROJ_PATH"
          cd "$PROJ_PATH"

          # 2. Correction rapide des permissions et des propriétés
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 3. Lancement du build (on utilise 'gradle' directement comme suggéré par Replit)
          gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # On utilise un pattern large pour trouver l'APK où qu'il soit généré
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
