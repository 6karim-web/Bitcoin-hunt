name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'
          cache-disabled: true

      - name: Reconstruct and Force Wrapper
        run: |
          # 1. On crée une structure de build 100% isolée
          rm -rf /tmp/final_build
          mkdir -p /tmp/final_build/app/src/main
          
          # 2. On aspire les fichiers vitaux
          find . -name "settings.gradle" -exec cp {} /tmp/final_build/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} /tmp/final_build/ \;
          find . -name "gradle.properties" -exec cp {} /tmp/final_build/ \;
          find . -name "build.gradle" -path "*/app/*" -exec cp {} /tmp/final_build/app/ \;
          
          # 3. On récupère le code source
          SRC_DIR=$(find . -type d -name "main" | head -n 1)
          cp -r "$SRC_DIR"/. /tmp/final_build/app/src/main/ || true
          
          cd /tmp/final_build
          
          # 4. GÉNÉRATION DU WRAPPER (La solution pour l'erreur de 54s)
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          
          # 5. CONFIGURATION DE FORCE (SDK 34 + Fusion des doublons)
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 6. COMPILATION : On utilise le gradlew qu'on vient de créer
          ./gradlew assembleDebug --no-daemon -x test -x lint \
            -Pandroid.packagingOptions.resources.pickFirsts="**/*.proto,google/protobuf/**" \
            -Pandroid.packageResources.ignoreErrors=true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
