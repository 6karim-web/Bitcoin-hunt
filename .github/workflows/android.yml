name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Ultimate Cleanup and Build
        run: |
          # 1. Création d'un environnement 100% propre
          rm -rf /tmp/build_zone
          mkdir -p /tmp/build_zone/app/src/main
          
          # 2. On récupère les fichiers vitaux
          find . -name "settings.gradle" -exec cp {} /tmp/build_zone/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} /tmp/build_zone/ \;
          find . -name "gradle.properties" -exec cp {} /tmp/build_zone/ \;
          find . -name "build.gradle" -path "*/app/*" -exec cp {} /tmp/build_zone/app/ \;
          
          # 3. On récupère le code source
          SRC_DIR=$(find . -type d -name "main" | head -n 1)
          cp -r "$SRC_DIR"/. /tmp/build_zone/app/src/main/ || true
          
          cd /tmp/build_zone
          
          # 4. On force les réglages de compatibilité
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 5. COMPILATION FINALE : On ignore les conflits de fichiers (Protobuf)
          gradle assembleDebug --no-daemon -x test \
            -Pandroid.extractNativeLibs=false \
            -Pandroid.packagingOptions.resources.excludes="**/protobuf/*,**/*.proto,META-INF/DEPENDENCIES"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
