name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Reconstruct Project and Build
        run: |
          # 1. On trouve le dossier qui contient 'app' et on le ramène à la racine
          APP_PARENT=$(find . -maxdepth 10 -type d -name "app" -exec dirname {} + | head -n 1)
          echo "Dossier parent trouvé : $APP_PARENT"
          cp -r "$APP_PARENT"/. .
          
          # 2. On force la reconnaissance du SDK 34
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 3. On lance la compilation
          gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
