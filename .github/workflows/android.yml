name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK (Smart Detect)
        run: |
          # On cherche le dossier qui contient 'settings.gradle' mais qui n'est PAS dans .github
          PROJECT_ROOT=$(find . -name "settings.gradle" -not -path "*/.github/*" -exec dirname {} + | head -n 1)
          
          if [ -z "$PROJECT_ROOT" ]; then
            echo "ERREUR : Fichier settings.gradle introuvable hors du dossier .github"
            exit 1
          fi
          
          echo "Projet détecté dans : $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/app-debug.apk"
          retention-days: 7
