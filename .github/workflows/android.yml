name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'
          cache-disabled: true

      - name: Physical Cleanup and Build
        run: |
          # 1. On crée une structure propre dans /tmp pour éviter les conflits
          rm -rf /tmp/final_build
          mkdir -p /tmp/final_build/app/src/main
          
          # 2. On récupère les fichiers vitaux (settings, builds, properties)
          find . -name "settings.gradle" -exec cp {} /tmp/final_build/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} /tmp/final_build/ \;
          find . -name "gradle.properties" -exec cp {} /tmp/final_build/ \;
          find . -name "build.gradle" -path "*/app/*" -exec cp {} /tmp/final_build/app/ \;
          
          # 3. On récupère le code source
          SRC_DIR=$(find . -type d -name "main" | head -n 1)
          cp -r "$SRC_DIR"/. /tmp/final_build/app/src/main/ || true
          
          cd /tmp/final_build
          
          # 4. LA SOLUTION RADICALE : Supprimer les fichiers de métadonnées et doublons
          # On efface les fichiers .proto et les infos de dépendances qui bloquent le build
          find . -name "*.proto" -type f -delete
          find . -name "DEPENDENCIES" -type f -delete
          
          # 5. On force le SDK 34 et on lance la compilation
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          gradle assembleDebug --no-daemon -x test -x lint

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
