name: Build Android APK - TOTAL CLEAN

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Hard Reset & Success Build
        run: |
          # 1. Nettoyage de tout ce qui peut gêner
          rm -rf .gradle app/build build settings.gradle build.gradle app/build.gradle app/src/main/AndroidManifest.xml

          # 2. Structure propre
          mkdir -p app/src/main/java/com/example/bitcoinhunt
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # 3. Configuration Gradle 9.4.1 (Standard 2026)
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "BitcoinHunt"
          include ':app'
          EOF

          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.bitcoinhunt'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.bitcoinhunt"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # 4. MANIFEST CORRIGÉ (L'ERREUR VENAIT D'ICI)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com">
              <application
                  android:allowBackup="true"
                  android:label="Bitcoin Hunt"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.Light">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. Build final
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BitcoinHunt-Final
          path: app/build/outputs/apk/debug/*.apk
