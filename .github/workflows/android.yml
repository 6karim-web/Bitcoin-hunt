name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Suppression du cache automatique pour éviter les fichiers corrompus des essais précédents

      - name: Clean and Generate Build Files
        run: |
          # 1. NETTOYAGE TOTAL (y compris les fichiers cachés)
          find . -maxdepth 1 ! -name '.github' ! -name '.' -exec rm -rf {} +

          # 2. STRUCTURE MINIMALE
          mkdir -p app/src/main/java/com/example/bitcoinhunt
          mkdir -p app/src/main/res/values

          # 3. SETTINGS (Format Gradle 9.4.1)
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "BitcoinHunt"
          include ':app'
          EOF

          # 4. BUILD.GRADLE (Plugin AGP 8.3.0)
          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.3.0' apply false }
          EOF

          # 5. APP/BUILD.GRADLE (SDK 34)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.bitcoinhunt'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.bitcoinhunt"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
          }
          EOF

          # 6. MANIFEST & JAVA
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com">
              <application android:label="Bitcoin Hunt" android:theme="@style/Theme.AppCompat.Light">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/java/com/example/bitcoinhunt/MainActivity.java
          package com.example.bitcoinhunt;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          EOF

          # 7. BUILD AVEC OPTIONS DE SÉCURITÉ
          # --no-build-cache évite les erreurs de tâches précédentes
          gradle assembleDebug --no-daemon --no-build-cache --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BitcoinHunt-APK
          path: app/build/outputs/apk/debug/*.apk
