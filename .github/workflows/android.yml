name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Fix Directory Structure and Build
        run: |
          # 1. On trouve où est caché le fichier settings.gradle
          WRONG_PATH=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          echo "Projet trouvé dans : $WRONG_PATH"
          
          # 2. On déplace TOUT le contenu de ce dossier vers la racine du projet
          cp -r "$WRONG_PATH"/. .
          
          # 3. On lance la compilation depuis la racine propre
          gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/app-debug.apk"
          retention-days: 7
