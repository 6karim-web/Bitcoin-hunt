name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Force Build (Ignore folders)
        run: |
          # On cherche le dossier qui contient settings.gradle et on se met dedans
          PROJ_DIR=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          cd "$PROJ_DIR"
          # On lance le build en ignorant les erreurs de lint et de check
          gradle assembleDebug -x lint -x test --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
