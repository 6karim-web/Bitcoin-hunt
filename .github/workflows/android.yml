name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Reset and Build
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/example/bitcoinhunt
          mkdir -p app/src/main/res/values

          # 1. PROPERTIES
          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # 2. SETTINGS (Strictement pour Gradle 9)
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "BitcoinHunt"
          include ':app'
          EOF

          # 3. BUILD.GRADLE (AGP 8.2.2)
          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.2.2' apply false }
          EOF

          # 4. APP/BUILD.GRADLE
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.bitcoinhunt'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.bitcoinhunt"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
          }
          EOF

          # 5. RESSOURCES OBLIGATOIRES (Pour éviter le crash après checkMetadata)
          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
              <color name="purple_500">#FF6200EE</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.BitcoinHunt" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/purple_500</item>
              </style>
          </resources>
          EOF

          # 6. MANIFEST & JAVA
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com">
              <application android:label="Bitcoin Hunt" android:theme="@style/Theme.BitcoinHunt">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/java/com/example/bitcoinhunt/MainActivity.java
          package com.example.bitcoinhunt;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          EOF

          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BitcoinHunt-APK
          path: app/build/outputs/apk/debug/*.apk
