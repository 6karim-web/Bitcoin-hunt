name: Build Android APK - Atomic Force

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Atomic Reconstruct and Build
        run: |
          # 1. Créer une structure Android standard propre
          mkdir -p force_build/app/src/main
          
          # 2. Aspirer les fichiers vitaux (prend le premier trouvé pour chaque)
          find . -name "settings.gradle" -exec cp {} force_build/ \; | head -n 1
          find . -name "build.gradle" -not -path "./app/*" -exec cp {} force_build/ \; | head -n 1
          find . -name "build.gradle" -path "*/app/*" -exec cp {} force_build/app/ \; | head -n 1
          find . -name "AndroidManifest.xml" -exec cp --parents {} force_build/app/src/main/ \; 
          
          # Nettoyage des chemins pour le Manifest (on remonte tout dans main/)
          mv force_build/app/src/main/**/*.xml force_build/app/src/main/ 2>/dev/null || true
          
          # 3. Aspirer les dossiers sources et ressources (sans doublons)
          find . -type d -name "java" -exec cp -r {} force_build/app/src/main/ \; | head -n 1
          find . -type d -name "res" -exec cp -r {} force_build/app/src/main/ \; | head -n 1
          
          # 4. Correction des bugs de compatibilité
          cd force_build
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 5. Nettoyage radical des fichiers conflictuels
          find . -name "*.proto" -delete
          find . -name "duplicate_*" -delete
          
          # 6. FORCE BUILD
          # On essaie d'abord la tâche standard, sinon on force l'assemble global
          gradle assembleDebug --no-daemon -x test -x lint || gradle assemble --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-atomic
          path: "**/*.apk"
          retention-days: 7
