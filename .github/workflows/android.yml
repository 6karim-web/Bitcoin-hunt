name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Deep Search and Build
        run: |
          # 1. On trouve le dossier exact qui contient 'settings.gradle'
          TARGET_DIR=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          echo "Le projet est ici : $TARGET_DIR"
          
          # 2. On entre dans ce dossier
          cd "$TARGET_DIR"
          
          # 3. On force la config SDK et on lance la fabrication
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # On utilise --info pour être sûr de voir ce qui se passe
          gradle assembleDebug --info --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
