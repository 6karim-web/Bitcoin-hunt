name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Force Clean Build
        run: |
          # 1. On trouve le dossier où sont tes fichiers et on les remet à la racine
          WRONG_PATH=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          cp -r "$WRONG_PATH"/. .
          
          # 2. On supprime les fichiers Gradle potentiellement corrompus
          rm -rf .gradle
          
          # 3. On lance la compilation en mode "Info" pour voir l'erreur exacte si ça rate
          gradle assembleDebug --info --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
