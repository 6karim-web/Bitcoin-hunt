name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle 7.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6'

      - name: Reconstruct Project and Build
        run: |
          # 1. On crée une structure propre
          mkdir -p final_project/app/src/main
          
          # 2. On ramasse les fichiers de config
          find . -name "settings.gradle" -exec cp {} final_project/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} final_project/ \;
          find . -name "gradle.properties" -exec cp {} final_project/ \;
          
          # 3. On ramasse les fichiers de l'app
          find . -name "build.gradle" -path "*/app/*" -exec cp {} final_project/app/ \;
          find . -name "AndroidManifest.xml" -exec cp {} final_project/app/src/main/ \;
          
          # 4. On ramasse le code et les ressources
          cp -r $(find . -type d -name "java") final_project/app/src/main/ 2>/dev/null || true
          cp -r $(find . -type d -name "res") final_project/app/src/main/ 2>/dev/null || true
          cp -r $(find . -type d -name "assets") final_project/app/src/main/ 2>/dev/null || true
          
          # 5. On lance le build
          cd final_project
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
