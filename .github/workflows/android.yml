name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Final Build Attempt
        run: |
          # 1. On isole le projet dans un dossier propre
          mkdir -p /tmp/clean_project/app/src/main
          find . -name "settings.gradle" -exec cp {} /tmp/clean_project/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} /tmp/clean_project/ \;
          find . -name "gradle.properties" -exec cp {} /tmp/clean_project/ \;
          find . -name "build.gradle" -path "*/app/*" -exec cp {} /tmp/clean_project/app/ \;
          
          # 2. On récupère le code source
          SRC_DIR=$(find . -type d -name "main" | head -n 1)
          cp -r "$SRC_DIR"/. /tmp/clean_project/app/src/main/ || true
          
          cd /tmp/clean_project
          
          # 3. SOLUTION ANTI-DOUBLON : On configure Gradle pour fusionner les fichiers en conflit
          # On ajoute un bloc android { packagingOptions { ... } } à la fin du fichier
          echo "android.packagingOptions.resources.pickFirsts.add('**/*.proto')" >> gradle.properties
          echo "android.packagingOptions.resources.pickFirsts.add('google/protobuf/**')" >> gradle.properties
          echo "android.packagingOptions.resources.excludes.add('META-INF/DEPENDENCIES')" >> gradle.properties
          
          # 4. Compilation avec SDK 34 forcé
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
