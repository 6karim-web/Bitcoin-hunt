name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'
          cache-disabled: true

      - name: Kill Conflict and Build
        run: |
          # 1. On prépare l'environnement propre comme avant
          rm -rf /tmp/final_build
          mkdir -p /tmp/final_build/app/src/main
          find . -name "settings.gradle" -exec cp {} /tmp/final_build/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} /tmp/final_build/ \;
          find . -name "gradle.properties" -exec cp {} /tmp/final_build/ \;
          find . -name "build.gradle" -path "*/app/*" -exec cp {} /tmp/final_build/app/ \;
          SRC_DIR=$(find . -type d -name "main" | head -n 1)
          cp -r "$SRC_DIR"/. /tmp/final_build/app/src/main/ || true
          
          cd /tmp/final_build
          
          # 2. LA SOLUTION AU CONFLIT : On force l'exclusion de javalite dans build.gradle
          # On cherche la ligne 'dependencies {' et on injecte l'exclusion juste après
          sed -i '/dependencies {/a \    configurations.all { exclude group: "com.google.protobuf", module: "protobuf-javalite" }' app/build.gradle
          
          # 3. On crée le wrapper pour la stabilité
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          
          # 4. On force le SDK et on compile
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          ./gradlew assembleDebug --no-daemon -x test -x lint

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
