name: Build Android APK - TOTAL CLEAN

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Radical Cleanup and Build
        run: |
          # 1. CRÉATION D'UNE STRUCTURE PROPRE DÈS LA RACINE
          mkdir -p app/src/main/java/com/example/bitcoinhunt
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          
          # 2. RÉCUPÉRATION DES SOURCES (Si existantes)
          # On cherche le Manifest et le MainActivity pour les replacer au bon endroit
          find . -name "AndroidManifest.xml" -not -path "./app/*" -exec cp {} app/src/main/AndroidManifest.xml \; || true
          find . -name "MainActivity.java" -not -path "./app/*" -exec cp {} app/src/main/java/com/example/bitcoinhunt/MainActivity.java \; || true
          find . -name "MainActivity.kt" -not -path "./app/*" -exec cp {} app/src/main/java/com/example/bitcoinhunt/MainActivity.kt \; || true

          # 3. GÉNÉRATION DES FICHIERS DE CONFIGURATION GRADLE (Écrase les anciens)
          cat <<EOF > settings.gradle
          rootProject.name = "BitcoinHunt"
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { 
              id 'com.android.application'
          }
          android {
              namespace 'com.example.bitcoinhunt'
              compileSdk 33
              defaultConfig {
                  applicationId "com.example.bitcoinhunt"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

          # 4. RESSOURCES CRITIQUES (Évite les erreurs de ressources manquantes)
          cat <<EOF > app/src/main/res/values/strings.xml
          <resources><string name="app_name">Bitcoin Hunt</string></resources>
          EOF
          
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.BitcoinHunt" parent="Theme.MaterialComponents.DayNight.DarkActionBar" />
          </resources>
          EOF

          # 5. GÉNÉRATION DU WRAPPER ET BUILD
          # On utilise Gradle installé sur l'image runner pour construire l'APK
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BitcoinHunt-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
