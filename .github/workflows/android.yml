name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Surgical Fix and Build
        run: |
          # 1. On crée un dossier temporaire isolé
          mkdir -p /tmp/app_build/app/src/main
          
          # 2. On aspire uniquement ce qui compte vraiment
          find . -name "settings.gradle" -exec cp {} /tmp/app_build/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} /tmp/app_build/ \;
          find . -name "gradle.properties" -exec cp {} /tmp/app_build/ \;
          find . -name "build.gradle" -path "*/app/*" -exec cp {} /tmp/app_build/app/ \;
          
          # On cherche le dossier src le plus complet
          SRC_DIR=$(find . -type d -name "main" | head -n 1)
          cp -r "$SRC_DIR"/. /tmp/app_build/app/src/main/ || true
          
          # 3. On entre dans ce dossier propre et on patche les erreurs
          cd /tmp/app_build
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # Patch anti-doublon (Protobuf)
          sed -i '/android {/a \    packagingOptions { \n        pickFirst "**/*.proto" \n        pickFirst "google/protobuf/**" \n        exclude "META-INF/DEPENDENCIES" \n    }' app/build.gradle
          
          # 4. On lance l'APK
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
