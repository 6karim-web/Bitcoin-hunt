name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'
          cache-disabled: true

      - name: Auto-Detect and Build
        run: |
          # 1. On cherche le VRAI dossier qui contient 'settings.gradle'
          PROJ_ROOT=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          echo "Projet trouvé dans : $PROJ_ROOT"
          
          # 2. On crée un dossier de travail propre à la racine
          mkdir -p final_app/app
          
          # 3. On aspire les fichiers vitaux depuis l'endroit trouvé
          cp -r "$PROJ_ROOT"/* final_app/ 2>/dev/null || true
          
          # 4. On entre dans le dossier et on nettoie les doublons
          cd final_app
          find . -name "*.proto" -type f -delete
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          
          # 5. On lance la compilation
          gradle assembleDebug --no-daemon -x test -x lint

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
