name: Build Android APK - Atomic Reconstructor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Force Project Structure
        run: |
          # 1. Localiser le projet
          SETTINGS_PATH=$(find . -name "settings.gradle" | head -n 1)
          PROJ_ROOT=$(dirname "$SETTINGS_PATH")
          cd "$PROJ_ROOT"

          # 2. Création forcée du build.gradle racine
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. Création forcée du module 'app'
          mkdir -p app
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.bitcoin.hunt'
              compileSdk 34
              defaultConfig {
                  applicationId "com.bitcoin.hunt"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # 4. Remplacement du settings.gradle pour être sûr qu'il inclut ':app'
          echo "include ':app'" > settings.gradle

          # 5. Aspiration des fichiers Java et ressources
          mkdir -p app/src/main/java
          find . -name "*.java" -exec cp --parents {} app/src/main/java/ \; 2>/dev/null || true
          
          # 6. Build final
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          ./gradlew :app:assembleDebug --no-daemon -x test -x lint || gradle :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-atomic
          path: "**/*.apk"
          retention-days: 7
