name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Force Build and Ignore Errors
        run: |
          # 1. On remet les fichiers à la racine
          WRONG_PATH=$(find . -name "settings.gradle" -exec dirname {} + | head -n 1)
          cp -r "$WRONG_PATH"/. .
          
          # 2. On lance la compilation en ignorant les tests et les vérifications de style
          # On ajoute des options pour stabiliser Gradle sur GitHub
          gradle assembleDebug -x lint -x test --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
