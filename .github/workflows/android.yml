name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK (Auto-detect directory)
        run: |
          # Cette commande cherche le fichier build.gradle et entre dans son dossier
          PROJECT_DIR=$(find . -name "build.gradle" -not -path "*/app/*" -exec dirname {} + | head -n 1)
          echo "Projet trouvé dans : $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/app-debug.apk"
          retention-days: 7
