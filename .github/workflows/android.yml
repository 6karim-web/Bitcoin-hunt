name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Force Clean Build and Fix Duplicates
        run: |
          # 1. On nettoie tout pour éviter les erreurs "same file"
          rm -rf final_app
          mkdir -p final_app/app/src/main
          
          # 2. On regroupe les fichiers
          find . -name "settings.gradle" -exec cp {} final_app/ \;
          find . -name "build.gradle" -not -path "*/app/*" -exec cp {} final_app/ \;
          find . -name "gradle.properties" -exec cp {} final_app/ \;
          find . -name "build.gradle" -path "*/app/*" -exec cp {} final_app/app/ \;
          SRC_DIR=$(find . -type d -name "src" | head -n 1)
          cp -r "$SRC_DIR"/. final_app/app/src/ || true
          
          cd final_app
          
          # 3. SOLUTION FINALE : On force l'exclusion des fichiers qui font doublon
          # On ajoute un bloc 'packagingOptions' pour fusionner les fichiers protobuf
          sed -i '/android {/a \    packagingOptions { \n        pickFirst "google/protobuf/**" \n        exclude "META-INF/DEPENDENCIES" \n    }' app/build.gradle
          
          # 4. Compilation avec suppression des erreurs de SDK
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          gradle assembleDebug --no-daemon -x test

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
